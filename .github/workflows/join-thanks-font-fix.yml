name: Join Thanks And Font Fix

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/join-thanks-font-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch join modal state and fonts
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('nadi-portfolio.html')
          s = p.read_text()
          css = '''
    .newsletter-form input {
      font-family: var(--sans);
    }
    .newsletter-form button,
    .newsletter-status {
      font-family: var(--mono);
    }
    .newsletter-thanks {
      display: none;
      padding: 24px;
      border: 1px solid rgba(255, 107, 43, .55);
      background: linear-gradient(145deg, rgba(28, 29, 33, .94), rgba(10, 11, 13, .88));
      box-shadow: 0 22px 70px rgba(0, 0, 0, .22);
      color: var(--paper);
      text-align: left;
    }
    .newsletter-thanks h3 {
      margin-bottom: 14px;
      color: var(--orange);
      font: 600 clamp(2.4rem, 7vw, 4.6rem)/.9 var(--display);
      text-transform: uppercase;
      letter-spacing: -.02em;
    }
    .newsletter-thanks p {
      color: var(--muted);
      font-family: var(--sans);
      line-height: 1.7;
    }
    .newsletter-dialog.is-signed-up .newsletter-form { display: none; }
    .newsletter-dialog.is-signed-up .newsletter-thanks { display: block; }
'''
          if '.newsletter-thanks' not in s:
              s = s.replace('    .newsletter-status { min-height: 20px; color: var(--orange); font: 400 .78rem/1.4 var(--mono); letter-spacing: .05em; text-transform: uppercase; }\n', '    .newsletter-status { min-height: 20px; color: var(--orange); font: 400 .78rem/1.4 var(--mono); letter-spacing: .05em; text-transform: uppercase; }\n' + css + '\n')
          old = '''        <p class="newsletter-status" id="newsletterStatus"></p>
      </form>'''
          new = '''        <p class="newsletter-status" id="newsletterStatus"></p>
      </form>
      <div class="newsletter-thanks" id="newsletterThanks">
        <h3>Thanks!!!</h3>
        <p>You are already on the list for this visit. Check your email for the welcome note.</p>
      </div>'''
          if 'id="newsletterThanks"' not in s:
              s = s.replace(old, new)
          s = s.replace('    if (newsletterOpen && newsletterDialog) newsletterOpen.addEventListener("click", () => newsletterDialog.showModal());', '    if (newsletterOpen && newsletterDialog) newsletterOpen.addEventListener("click", () => { if (sessionStorage.getItem("nadidougNewsletterSignedUp") === "true") newsletterDialog.classList.add("is-signed-up"); newsletterDialog.showModal(); });')
          s = s.replace('        newsletterForm.reset();\n        newsletterStatus.textContent = "You are on the list.";', '        newsletterForm.reset();\n        sessionStorage.setItem("nadidougNewsletterSignedUp", "true");\n        newsletterDialog.classList.add("is-signed-up");\n        newsletterStatus.textContent = "You are on the list.";')
          p.write_text(s)
          PY
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nadi-portfolio.html
          git diff --cached --quiet || git commit -m "Add join thanks state and matching fonts"
          git push
