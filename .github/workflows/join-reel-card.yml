name: Make Join Reel Style

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/join-reel-card.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Join button to reel style
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('nadi-portfolio.html')
          s = p.read_text()
          css = '''
    .contact-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 14px;
      margin-top: 32px;
    }
    .contact-card {
      min-height: 150px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid rgba(242, 239, 232, .24);
      background: linear-gradient(145deg, rgba(20, 22, 26, .88), rgba(8, 9, 11, .80));
      box-shadow: 0 22px 70px rgba(0, 0, 0, .22);
      backdrop-filter: blur(18px) saturate(.8);
      color: var(--paper);
      text-decoration: none;
      text-align: left;
      cursor: pointer;
      font: inherit;
      transition: border-color .25s ease, background .25s ease, transform .25s ease;
    }
    .contact-card:hover,
    .contact-card:focus-visible {
      border-color: rgba(255, 107, 43, .9);
      background: linear-gradient(145deg, rgba(28, 29, 33, .94), rgba(10, 11, 13, .88));
      transform: translateY(-4px);
    }
    .contact-card:focus-visible { outline: 2px solid var(--orange); outline-offset: 4px; }
    .contact-card-index { color: var(--blue); font: 500 10px/1 var(--mono); letter-spacing: .15em; text-transform: uppercase; }
    .contact-card h3 { margin-top: 28px; font: 600 1.7rem/1 var(--display); text-transform: uppercase; }
    .contact-card-arrow { margin-top: 18px; color: var(--paper); font: 300 1.1rem/1 var(--mono); }
'''
          if '.contact-card' not in s:
              s = s.replace('    .button:focus-visible { outline: 2px solid var(--orange); outline-offset: 4px; }\n', '    .button:focus-visible { outline: 2px solid var(--orange); outline-offset: 4px; }\n' + css + '\n')
          s = s.replace('    .actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }', '    .actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }')
          old_variants = [
'''        <div class="actions">
          <a class="button" href="mailto:nadi@nadidoug.com">Email</a>
          <button class="button" id="newsletterOpen" type="button">Join</button>
          <a class="button" href="#" download>Resume</a>
          <a class="button" href="https://github.com/nadidoug" target="_blank" rel="noopener noreferrer">GitHub</a>
        </div>''',
'''        <div class="actions">
          <a class="button" href="mailto:nadi@nadidoug.com">Email</a>
          <a class="button" href="join.html">Join</a>
          <a class="button" href="#" download>Resume</a>
          <a class="button" href="https://github.com/nadidoug" target="_blank" rel="noopener noreferrer">GitHub</a>
        </div>''',
'''        <div class="actions">
          <a class="button" href="mailto:hello@example.com">Email</a>
          <a class="button" href="#" download>Resume</a>
          <a class="button" href="https://github.com/nadidoug" target="_blank" rel="noopener noreferrer">GitHub</a>
        </div>'''
          ]
          new = '''        <div class="contact-actions">
          <a class="contact-card" href="mailto:nadi@nadidoug.com"><span class="contact-card-index">Contact 001</span><div><h3>Email</h3><span class="contact-card-arrow">↗</span></div></a>
          <button class="contact-card" id="newsletterOpen" type="button"><span class="contact-card-index">Contact 002</span><div><h3>Join</h3><span class="contact-card-arrow">↗</span></div></button>
          <a class="contact-card" href="#" download><span class="contact-card-index">Contact 003</span><div><h3>Resume</h3><span class="contact-card-arrow">↗</span></div></a>
          <a class="contact-card" href="https://github.com/nadidoug" target="_blank" rel="noopener noreferrer"><span class="contact-card-index">Contact 004</span><div><h3>GitHub</h3><span class="contact-card-arrow">↗</span></div></a>
        </div>'''
          for old in old_variants:
              if old in s:
                  s = s.replace(old, new)
                  break
          p.write_text(s)
          PY
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nadi-portfolio.html
          git diff --cached --quiet || git commit -m "Make contact actions match reel cards"
          git push
