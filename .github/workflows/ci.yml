name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required site files
        shell: bash
        run: |
          test -s index.html
          test -s nadi-portfolio.html
          test -s nadi-douglas-resume.html
      - name: Check for unresolved merge markers
        shell: bash
        run: |
          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' --include='*.html' --include='*.md' --include='*.ts' .; then
            echo 'Unresolved merge markers found.'
            exit 1
          fi

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
